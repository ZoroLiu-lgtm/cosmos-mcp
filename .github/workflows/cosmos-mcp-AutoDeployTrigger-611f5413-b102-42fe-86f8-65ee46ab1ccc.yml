name: Trigger auto deployment for cosmos-mcp

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/cosmos-mcp-AutoDeployTrigger-611f5413-b102-42fe-86f8-65ee46ab1ccc.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.COSMOSMCP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.COSMOSMCP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.COSMOSMCP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: leap20acr12345.azurecr.io
          registryUsername: ${{ secrets.COSMOSMCP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.COSMOSMCP_REGISTRY_PASSWORD }}
          containerAppName: cosmos-mcp
          resourceGroup: leap20
          imageToBuild: leap20acr12345.azurecr.io/cosmos-mcp:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


